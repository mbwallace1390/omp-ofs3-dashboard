name: Create ofs3-lua-ethos ZIP on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  create-zip:
    name: Build PR ZIP (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [en, de, es, fr, it, nl]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables (PR version)
        run: |
          PR_NUMBER='${{ github.event.pull_request.number }}'
          echo "GIT_VER=PR-${PR_NUMBER}" >> "$GITHUB_ENV"

      - name: Build package for locale ${{ matrix.lang }}
        run: |
          ART="omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}.zip"
          python .github/scripts/build_locale_package.py \
            --lang "${{ matrix.lang }}" \
            --version "${{ env.GIT_VER }}" \
            --artifact "$ART"
          echo "ARTIFACT=$ART" >> "$GITHUB_ENV"

      - name: Upload per-locale ZIP
        uses: actions/upload-artifact@v4
        with:
          name: omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
