name: Snapshot

on:
  push:
    tags:
      - "snapshot/*"

permissions:
  contents: write

jobs:
  build-zips:
    name: Build per-locale ZIPs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [en, de, es, fr, it, nl]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables
        id: buildvars
        shell: bash
        run: |
          GIT_TAG="${GITHUB_REF_NAME}"
          GIT_VER="${GIT_TAG#snapshot/}"
          echo "GIT_VER=$GIT_VER" >> "$GITHUB_ENV"
          echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"
          echo "GH_TYPE=Snapshot" >> "$GITHUB_ENV"

      - name: Build package for locale ${{ matrix.lang }}
        shell: bash
        run: |
          ART="omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}.zip"
          python .github/scripts/build_locale_package.py \
            --lang "${{ matrix.lang }}" \
            --version "${{ env.GIT_VER }}" \
            --artifact "$ART"
          echo "ARTIFACT=$ART" >> "$GITHUB_ENV"

      - name: Upload per-locale artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  create-snapshot:
    name: Create Snapshot Release
    runs-on: ubuntu-latest
    needs: [build-zips]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build variables
        id: buildvars
        shell: bash
        run: |
          GIT_TAG="${GITHUB_REF_NAME}"
          GIT_VER="${GIT_TAG#snapshot/}"
          echo "GIT_VER=$GIT_VER" >> "$GITHUB_ENV"
          echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la ./dist

      - name: Create snapshot notes
        run: |
          .github/scripts/extract-release-notes.py "${{ env.GIT_VER }}" Releases.md > Notes.md
          sed -n '1,200p' Notes.md

      - name: Create Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd dist
          gh release create "${{ env.GIT_TAG }}" --prerelease --notes-file ../Notes.md --title "OFS3 Dashboard - Snapshot ${{ env.GIT_VER }}" *.zip
