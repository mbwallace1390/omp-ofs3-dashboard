name: Release

on:
  push:
    tags:
      - "release/*"

permissions:
  contents: write

jobs:
  build-zips:
    name: Build per-locale ZIPs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [en, de, es, fr, it, nl]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables (from tag)
        id: buildvars
        shell: bash
        run: |
          GIT_TAG="${GITHUB_REF_NAME}"
          GIT_VER="${GIT_TAG#release/}"
          if [[ $GIT_VER =~ ^[0-9]+\.[0-9]+\.[0-9]+-[A-Za-z0-9]+$ ]]; then
            GH_TYPE="Release Candidate"
          else
            GH_TYPE="Release"
          fi
          echo "GIT_VER=$GIT_VER" >> "$GITHUB_ENV"
          echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"
          echo "GH_TYPE=$GH_TYPE" >> "$GITHUB_ENV"

      - name: Build package for locale ${{ matrix.lang }}
        shell: bash
        run: |
          ART="omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}.zip"
          python .github/scripts/build_locale_package.py \
            --lang "${{ matrix.lang }}" \
            --version "${{ env.GIT_VER }}" \
            --artifact "$ART"
          echo "ARTIFACT=$ART" >> "$GITHUB_ENV"

      - name: Upload per-locale artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-ofs3-dashboard-${{ env.GIT_VER }}-${{ matrix.lang }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-zips]
    steps:
      - name: Checkout repo (for release notes script)
        uses: actions/checkout@v4

      - name: Set build variables (from tag)
        id: buildvars
        shell: bash
        run: |
          GIT_TAG="${GITHUB_REF_NAME}"
          GIT_VER="${GIT_TAG#release/}"
          if [[ $GIT_VER =~ ^[0-9]+\.[0-9]+\.[0-9]+-[A-Za-z0-9]+$ ]]; then
            GH_TYPE="Release Candidate"
          else
            GH_TYPE="Release"
          fi
          echo "GIT_VER=$GIT_VER" >> "$GITHUB_ENV"
          echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"
          echo "GH_TYPE=$GH_TYPE" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la ./dist

      - name: Create release notes
        run: |
          python .github/scripts/extract-release-notes.py "${{ env.GIT_VER }}" Releases.md > Notes.md
          sed -n '1,200p' Notes.md

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd dist
          gh release create "${{ env.GIT_TAG }}" --notes-file ../Notes.md -t "OFS3 Dashboard - ${{ env.GH_TYPE }} ${{ env.GIT_VER }}" *.zip
