name: Apply OFS3 radio snapshot

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-ofs3-radio-sync.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply complete tested radio copy
        shell: bash
        run: |
          set -euo pipefail
          cat .ofs3-sync/part001 .ofs3-sync/part002 .ofs3-sync/part003a .ofs3-sync/part003b > /tmp/ofs3.tar.xz.b64
          base64 -d /tmp/ofs3.tar.xz.b64 > /tmp/ofs3.tar.xz
          echo "96691047f23f5a4cf0838d28ece5385e3ad3adf85dc088b4b205ab5ba75b46dd  /tmp/ofs3.tar.xz" | sha256sum -c -
          mkdir -p src/ofs3
          tar -xJf /tmp/ofs3.tar.xz -C src/ofs3
          mkdir -p src/ofs3/widgets/dashboard/themes/@rt-rc-classic
          cp src/ofs3/widgets/dashboard/themes/@rt-rc/icon.png src/ofs3/widgets/dashboard/themes/@rt-rc-classic/icon.png
          rm -rf .ofs3-sync
          rm -f .github/workflows/apply-ofs3-radio-sync.yml
          git config user.name "Michael Wallace"
          git config user.email "mbwallace1390@users.noreply.github.com"
          git add -A
          git commit -m "Sync tested OFS3 radio files"
          git push origin HEAD:main
