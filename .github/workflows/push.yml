name: Create ofs3-lua-ethos ZIP on Push

on:
  push:
    branches:
      - "master"
      - "RF-*"

jobs:
  create-zip:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [en, de, es, fr, it, nl]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables (commit-based version)
        id: buildvars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "GIT_VER=commit-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "sha7=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build package for locale ${{ matrix.lang }}
        shell: bash
        run: |
          ART="omp-ofs3-dashboard-${{ matrix.lang }}-${{ env.GIT_VER }}.zip"
          python .github/scripts/build_locale_package.py \
            --lang "${{ matrix.lang }}" \
            --version "${{ env.GIT_VER }}" \
            --artifact "$ART"
          echo "ARTIFACT=$ART" >> "$GITHUB_ENV"

      - name: Upload per-locale artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-ofs3-dashboard-${{ matrix.lang }}-${{ env.GIT_VER }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
