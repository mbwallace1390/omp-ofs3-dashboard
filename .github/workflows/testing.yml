name: Testing

on:
  push:
    tags:
      - "testing/*"

permissions:
  contents: write

jobs:
  build-zips:
    name: Build testing ZIP (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [en, de, es, fr, it, nl]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables
        run: |
          echo "GIT_VER=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "GIT_TAG=${GITHUB_REF##refs/tags/}" >> "$GITHUB_ENV"
          cat "$GITHUB_ENV"

      - name: Build package for locale ${{ matrix.lang }}
        run: |
          ART="omp-ofs3-dashboard-testing-${{ env.GIT_VER }}-${{ matrix.lang }}.zip"
          python .github/scripts/build_locale_package.py \
            --lang "${{ matrix.lang }}" \
            --version "${{ env.GIT_VER }}" \
            --artifact "$ART"
          echo "ARTIFACT=$ART" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-ofs3-dashboard-testing-${{ env.GIT_VER }}-${{ matrix.lang }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  delete-tag:
    name: Delete testing tag
    runs-on: ubuntu-latest
    needs: [build-zips]
    steps:
      - uses: actions/checkout@v4

      - name: Delete tag
        run: git push origin :${GITHUB_REF}
